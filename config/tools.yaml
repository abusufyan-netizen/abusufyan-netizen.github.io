  - name: "What is my IP Address?"
    slug: "what-is-my-ip"
    category: "Network & Performance"
    icon: "Globe"
    tags: ["ip", "networking", "security", "location", "privacy"]
    priority: 2
    releaseDate: "2026-05-09"
    function:
      primary: "Instantly find your public IPv4/IPv6, location, and connection audit"
    technical:
      input_formats: ["none"]
      output_formats: ["json", "txt"]
      processing: "server-side"
    meta:
      title: "Check My Public IPv4 & IPv6 Address — Real-time Location Audit"
    content:
      title: "What is my IP Address? — Instant Public IP Checker"
      description: "Instantly find your public IPv4/IPv6 address, approximate geographic location, and connection details with our secure, real-time IP checker."
      keywords: ["what is my ip address", "check public ip", "find my ipv6", "ip address location finder", "vpn leak test", "public ip audit"]
      entity_definition: "What Is My IP Address is a real-time network diagnostic tool that identifies your public-facing internet identity. It detects your IP address (IPv4 or IPv6), approximate geographic location (City, Region, Country), and connection protocol. This tool is essential for verifying VPN connectivity and troubleshooting network configurations securely."
      how_it_works: "When you open this page, our global edge network analyzes the incoming HTTP headers. We extract the 'X-Forwarded-For' or 'X-Real-IP' headers to find your public address. Simultaneously, we use Vercel's Geo-IP database to resolve your approximate location."
      use_cases:
        - "Verifying VPN or Proxy functionality"
        - "Checking network location for region-locked services"
        - "Diagnostic auditing of connection protocols"
      features:
        - "Instant IPv4 and IPv6 detection"
        - "Global Geo-IP resolution (City, Region, Country)"
        - "User-Agent and Browser string analysis"
        - "Secure, private processing"
      faq:
        - question: "What is an IP address?"
          answer: "An IP address is a unique string of characters that identifies each computer using the Internet Protocol."
        - question: "Is my private IP the same as my public IP?"
          answer: "No. Your private IP is assigned by your router for your home network. Your public IP is assigned by your ISP."

